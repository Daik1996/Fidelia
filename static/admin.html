<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Fidelia · Gestión</title>
<meta name="theme-color" content="#6d3b5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<script src="/static/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#6d3b5e; --plum-700:#552d49; --gold:#e0a021; --gold-600:#c98a15;
    --ink:#231c21; --muted:#8a7f86; --line:#eae3e7; --bg:#faf7f8;
    --card:#ffffff; --ok:#2f8f5b; --bad:#c0392b; --info:#3a6ea5;
    --shadow:0 1px 2px rgba(35,28,33,.05), 0 8px 30px rgba(109,59,94,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;margin:0}
  a{color:var(--plum)}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:9px 11px;
    border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--plum);outline-offset:-1px;border-color:var(--plum)}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 5px}
  .btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;
    padding:9px 16px;border-radius:9px;font-weight:600;font-size:14px;transition:.12s;white-space:nowrap}
  .btn-primary{background:var(--plum);color:#fff}
  .btn-primary:hover{background:var(--plum-700)}
  .btn-gold{background:var(--gold);color:#3a2600}
  .btn-gold:hover{background:var(--gold-600)}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--plum);color:var(--plum)}
  .btn-danger{background:#fff;border:1px solid #f0cfca;color:var(--bad)}
  .btn-danger:hover{background:var(--bad);color:#fff;border-color:var(--bad)}
  .btn-sm{padding:6px 11px;font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .hide{display:none !important}

  /* Login */
  #login{min-height:100vh;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1200px 500px at 20% -10%, #7c4569 0%, transparent 60%),
               radial-gradient(900px 500px at 100% 110%, #e0a02122 0%, transparent 55%), var(--bg)}
  #login .card{width:100%;max-width:380px;padding:30px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:var(--plum);color:#fff;
    display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:19px}
  .brand-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px}

  /* App shell */
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .sidebar{background:#fff;border-right:1px solid var(--line);padding:18px 14px;
    display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
    font-weight:500;color:var(--ink);cursor:pointer;font-size:14px}
  .nav-item:hover{background:#f4eef2}
  .nav-item.active{background:var(--plum);color:#fff}
  .nav-item .ic{width:18px;text-align:center}
  .nav-sep{margin-top:auto}
  .main{padding:26px 30px;max-width:1080px}
  .page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:14px;flex-wrap:wrap}
  .page-head h1{font-size:26px;font-weight:800}
  .sub{color:var(--muted);font-size:13.5px;margin-top:3px}

  /* Grids */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
  .stat{padding:16px 18px;display:flex;align-items:center;gap:13px}
  .stat-ic{font-size:24px;width:46px;height:46px;flex:none;display:grid;place-items:center;
    background:linear-gradient(135deg, rgba(141,68,112,.10), rgba(224,160,33,.10));border-radius:12px}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:28px;margin-top:2px}
  .stat .v small{font-size:15px;color:var(--muted);font-weight:600}
  /* Entrada suave al cambiar de sección */
  @keyframes viewfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .main > *{animation:viewfade .18s ease}
  .row-click{transition:background .12s ease}
  .row-click:hover{background:rgba(141,68,112,.05);cursor:pointer}
  /* Selector de tipo de negocio (asistente inicial) */
  .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:230px;overflow:auto;padding:2px}
  .tpl-pick{display:flex;flex-direction:column;gap:2px;border:2px solid var(--line);border-radius:12px;
    padding:10px 12px;cursor:pointer;position:relative;transition:.12s}
  .tpl-pick:hover{border-color:var(--plum-300,#c9a3ba)}
  .tpl-pick.sel{border-color:var(--plum,#8d4470);background:rgba(141,68,112,.06)}
  .tpl-pick input{position:absolute;opacity:0;pointer-events:none}
  .tpl-emoji{font-size:22px}
  .tpl-name{font-weight:700;font-size:14px}
  .tpl-desc{font-size:11.5px;color:var(--muted);line-height:1.3}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:14px}

  /* Tables */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px}
  tr:last-child td{border-bottom:none}
  .row-click{cursor:pointer}
  .row-click:hover{background:#faf6f8}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
  .pill{display:inline-flex;align-items:center;gap:6px;background:#f4eef2;color:var(--plum);
    padding:3px 10px;border-radius:20px;font-size:12.5px;font-weight:600}
  .progress{height:8px;background:#eee;border-radius:6px;overflow:hidden}
  .progress>span{display:block;height:100%;background:var(--gold)}

  /* Program tabs */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;border-bottom:1px solid var(--line)}
  .tab{padding:9px 14px;font-weight:600;font-size:14px;color:var(--muted);cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--plum);border-bottom-color:var(--plum)}
  .section-card{padding:22px;margin-bottom:18px}
  /* Vista "Sumar puntos": grande, táctil, sin distracciones */
  .charge-card{max-width:560px;margin:0 auto}
  .charge-row{display:flex;gap:14px;flex-wrap:wrap}
  .charge-field{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
  .charge-field.charge-amt{min-width:150px;max-width:200px}
  .charge-field label{font-weight:700;font-size:14px;color:var(--ink)}
  .charge-field input{font-size:22px;padding:16px 16px;border:2px solid var(--line);border-radius:14px;
    background:var(--card);color:var(--ink);width:100%;font-weight:700}
  .charge-field input:focus{outline:none;border-color:var(--plum);box-shadow:0 0 0 3px rgba(141,68,112,.18)}
  .charge-visit{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;color:var(--muted);margin:16px 0 4px;cursor:pointer}
  .charge-visit input{width:20px;height:20px}
  .charge-btn{width:100%;font-size:19px;padding:17px;margin-top:8px;border-radius:14px}
  /* Resultado del cobro: gratificante y animado */
  .charge-result{margin-top:16px;border-radius:16px;padding:18px;
    background:linear-gradient(160deg,#f0faf4,#e7f6ee);border:1px solid #bfe4cf;
    box-shadow:0 8px 30px rgba(47,158,99,.16);animation:cr-in .45s cubic-bezier(.2,.9,.3,1.3)}
  .charge-result.has-reward{background:linear-gradient(160deg,#fff8e8,#fdf0d0);border-color:#f0d48a;
    box-shadow:0 8px 34px rgba(224,160,33,.26)}
  @keyframes cr-in{0%{opacity:0;transform:translateY(14px) scale(.97)}100%{opacity:1;transform:none}}
  .cr-top{display:flex;align-items:center;gap:12px}
  .cr-check{width:44px;height:44px;flex:none;border-radius:50%;background:#2f9e63;color:#fff;
    font-size:24px;font-weight:800;display:grid;place-items:center;animation:cr-pop .5s cubic-bezier(.2,.9,.3,1.6) .1s both}
  .has-reward .cr-check{background:#e0a021}
  @keyframes cr-pop{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
  .cr-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:19px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cr-sub{font-size:12.5px;color:var(--muted)}
  .cr-gain{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;color:#2f9e63;flex:none;
    animation:cr-gain .6s cubic-bezier(.2,.9,.3,1.6) .15s both;line-height:1}
  .cr-gain small{font-size:13px;color:var(--muted);font-weight:700;margin-left:2px}
  @keyframes cr-gain{0%{opacity:0;transform:scale(.4) translateY(8px)}70%{transform:scale(1.15)}100%{opacity:1;transform:none}}
  .cr-mult{margin-top:10px;background:#e8590c;color:#fff;font-weight:800;font-size:13px;
    padding:6px 12px;border-radius:20px;display:inline-block;animation:cr-in .4s .2s both}
  .cr-levelup{margin-top:10px;background:linear-gradient(135deg,#e0a021,#f5c451);color:#3a2600;
    font-weight:800;font-size:14.5px;padding:9px 14px;border-radius:12px;text-align:center;
    animation:cr-cheer .6s ease .25s both;box-shadow:0 4px 16px rgba(224,160,33,.4)}
  @keyframes cr-cheer{0%{opacity:0;transform:scale(.8)}50%{transform:scale(1.06)}100%{opacity:1;transform:none}}
  .cr-progress{margin-top:14px}
  .cr-prog-labels{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .cr-prog-bar{height:14px;background:#e3ebe6;border-radius:10px;overflow:hidden}
  .cr-prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#2f9e63,#57c98a);
    transition:width 1.1s cubic-bezier(.2,.8,.25,1);position:relative;
    box-shadow:0 0 10px rgba(47,158,99,.5)}
  .cr-prog-fill::after{content:'';position:absolute;inset:0;border-radius:10px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
    animation:cr-shine 1.8s ease-in-out infinite}
  @keyframes cr-shine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}
  @keyframes confetti-fall{
    0%{transform:translateY(0) rotate(0);opacity:1}
    100%{transform:translateY(105vh) rotate(680deg);opacity:.9}}
  .has-reward .cr-prog-fill{background:linear-gradient(90deg,#e0a021,#f5c451)}
  .cr-prog-text{font-size:13.5px;margin-top:7px;color:var(--ink)}
  .cr-total{margin-top:12px;font-size:14px;color:var(--ink);border-top:1px solid rgba(0,0,0,.06);padding-top:10px}
  .cr-reward{margin-top:14px;background:rgba(255,255,255,.6);border:1px dashed #e0a021;border-radius:12px;padding:12px}
  .cr-reward-head{font-weight:800;color:#a56a00;font-size:14.5px;margin-bottom:8px;animation:cr-glow 1.6s ease-in-out infinite}
  @keyframes cr-glow{0%,100%{opacity:1}50%{opacity:.65}}
  .cr-reward-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .cr-reward-chip{background:#fff;border:1px solid #f0d48a;color:#8a5a00;font-size:12.5px;font-weight:700;padding:4px 10px;border-radius:20px}
  .cr-link{display:inline-block;margin-top:12px;font-size:13px;color:var(--plum);font-weight:600;text-decoration:none}
  .section-card h3{font-size:17px;margin-bottom:4px}
  .section-card .hint{color:var(--muted);font-size:13px;margin-bottom:16px}
  .list-editor .row{display:grid;gap:10px;align-items:end;padding:12px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:10px;background:#fdfbfc}
  .lv-row{grid-template-columns:1.4fr .9fr .8fr 2fr auto}
  .rw-row{grid-template-columns:1.4fr .8fr .8fr .8fr 2fr auto}
  .swatch{width:38px;height:38px;padding:0;border-radius:8px;border:1px solid var(--line);cursor:pointer}
  .save-bar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 40%);
    padding:16px 0 4px;display:flex;justify-content:flex-end;gap:10px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(35,28,33,.42);display:grid;place-items:center;
    padding:20px;z-index:50}
  .modal{width:100%;max-width:560px;max-height:88vh;overflow:auto;padding:24px}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .close{font-size:22px;color:var(--muted);line-height:1;padding:2px 8px}

  /* Toast */
  #toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:99}
  .toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;
    box-shadow:var(--shadow);animation:slidein .2s ease}
  .toast.ok{background:var(--ok)} .toast.bad{background:var(--bad)}
  @keyframes slidein{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}

  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .bars{display:flex;flex-direction:column;gap:8px}
  .bar-row{display:grid;grid-template-columns:80px 1fr 40px;align-items:center;gap:10px;font-size:13px}
  .bar-track{height:20px;background:#f4eef2;border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;background:var(--plum);border-radius:6px}
  code.codebox{background:#f4eef2;padding:2px 7px;border-radius:6px;font-weight:600;color:var(--plum)}
  #menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:60;width:44px;height:44px;
    border-radius:12px;border:1px solid var(--line);background:var(--card,#fff);color:var(--ink,#231c21);
    font-size:20px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  #nav-backdrop{display:none;position:fixed;inset:0;background:rgba(20,14,18,.45);z-index:39}
  #nav-backdrop.show{display:block}
  @media(max-width:820px){
    #app{grid-template-columns:1fr}
    #menu-btn{display:grid;place-items:center}
    .sidebar{position:fixed;z-index:40;transform:translateX(-100%);transition:.2s;height:100vh;overflow-y:auto}
    .sidebar.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.3)}
    .form-grid,.two-col{grid-template-columns:1fr}
    .main{padding:64px 16px 18px}
    table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
    /* Editores de niveles y recompensas: apilar en 2 columnas en vez de 5-6 (causaba zoom) */
    .lv-row{grid-template-columns:1fr 1fr !important;gap:8px}
    .rw-row{grid-template-columns:1fr 1fr !important;gap:8px}
    .stat-grid{grid-template-columns:1fr 1fr}
    .bar-row{grid-template-columns:64px 1fr 34px;font-size:12px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <div class="brand"><div class="brand-mark">F</div><div class="brand-name">Fidelia</div></div>
    <p class="sub" style="margin-bottom:22px">Panel de gestión</p>
    <div class="field"><label>Usuario</label><input id="lg-user" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input id="lg-pass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
    <p id="lg-err" class="sub" style="color:var(--bad);margin-top:12px"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <button id="menu-btn" aria-label="Menú"
    onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('nav-backdrop').classList.toggle('show')">☰</button>
  <div id="nav-backdrop"
    onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show')"></div>
  <aside class="sidebar" id="sidebar">
    <div class="brand" style="margin:4px 8px 18px"><div class="brand-mark">F</div><div class="brand-name">Fidelia</div></div>
    <div class="nav-item active" data-view="charge"><span class="ic">＋</span> Sumar puntos</div>
    <div class="nav-item" data-view="dashboard"><span class="ic">◆</span> Panel</div>
    <div class="nav-item" data-view="customers"><span class="ic">◉</span> Clientes</div>
    <div class="nav-item" data-view="program"><span class="ic">⚙</span> Programa</div>
    <div class="nav-item" data-view="ranking"><span class="ic">★</span> Ranking</div>
    <div class="nav-item" data-view="promo"><span class="ic">🔥</span> Campañas</div>
    <div class="nav-item hide" id="nav-chain" data-view="chain"><span class="ic">👑</span> Mi cadena</div>
    <div class="nav-item nav-sep" data-view="settings"><span class="ic">⚑</span> Ajustes</div>
    <div class="nav-item" onclick="doLogout()"><span class="ic">⏻</span> Salir</div>
  </aside>

  <main class="main" id="main"><!-- vistas inyectadas por JS --></main>
</div>

<div id="modal-root"></div>
<div id="toasts"></div>

<!-- Aviso instalar app (dueño del restaurante) -->
<div id="install-banner" class="hide" style="position:fixed;left:12px;right:12px;bottom:12px;max-width:560px;margin:0 auto;
  background:var(--card,#fff);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
  box-shadow:0 10px 40px rgba(0,0,0,.18);display:flex;align-items:center;gap:12px;z-index:70">
  <div style="flex:1"><strong>📲 Añade "Fidelia" a tu dispositivo</strong>
    <div style="color:var(--muted);font-size:13px">Crea el acceso directo en tu pantalla de inicio y abre la gestión con un toque, sin buscar el enlace.</div></div>
  <button class="btn btn-primary" style="width:auto;margin:0;white-space:nowrap;padding:10px 16px" onclick="installApp()">Añadir</button>
  <button onclick="dismissInstall()" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer">×</button>
</div>

<script src="/static/admin.js?v=8ee2f9cd"></script>
</body>
</html>
