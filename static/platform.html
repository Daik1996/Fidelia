<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fidelia · Plataforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/static/qrcode.min.js"></script>
<style>
  :root{
    /* TEMA OSCURO: este es el panel del PROPIETARIO (el de los restaurantes es claro) */
    --plum:#c06a9e; --plum-700:#d585b5; --gold:#f2b63d; --ink:#faf5f8; --muted:#c2afbc;
    --line:#4d3a4a; --bg:#120b14; --card:#251a29; --ok:#4cc985; --bad:#ff6b57;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 34px rgba(0,0,0,.35); --radius:14px;
  }
  *{box-sizing:border-box}
  html{max-width:100%;overflow-x:hidden}
  body{margin:0;max-width:100%;overflow-x:hidden;font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;margin:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit;font-size:14px;width:100%;padding:9px 11px;
    border:1px solid var(--line);border-radius:9px;background:#332536;color:var(--ink)}
  input::placeholder{color:#8f7d8b}
  select option{background:#2b1f2e;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--plum);outline-offset:-1px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 5px}
  .btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;padding:9px 16px;
    border-radius:9px;font-weight:600;font-size:14px;transition:.12s;white-space:nowrap;text-decoration:none}
  .btn-primary{background:var(--plum);color:#fff}.btn-primary:hover{background:var(--plum-700)}
  .btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{background:rgba(255,255,255,.1);border-color:#6a5266}
  .btn-ghost:hover{border-color:var(--plum);color:var(--plum)}
  .btn-danger{background:transparent;border:1px solid #6d3730;color:var(--bad)}
  .btn-sm{padding:6px 11px;font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .hide{display:none!important}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:var(--plum);color:#fff;
    display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:19px}
  .brand-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px}
  .sub{color:var(--muted);font-size:13.5px}
  #login{min-height:100vh;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1200px 520px at 20% -10%, #4a2342 0%, transparent 60%),
               radial-gradient(900px 500px at 100% 110%, #e8b13c1e 0%, transparent 55%), var(--bg)}
  #login .card{width:100%;max-width:380px;padding:30px}
  .field{margin-bottom:14px}
  .wrap{max-width:1000px;margin:0 auto;padding:26px 20px 60px}
  .page-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .page-head h1{font-size:26px;font-weight:800}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  /* Rejilla de tarjetas dentro de cada bloque (cadena o sueltos) */
  .tgrid-inner,.chain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  /* Marco que agrupa los locales de una misma cadena */
  .chain-wrap{border:2px solid var(--gold);border-radius:20px;padding:0;overflow:hidden;
    background:linear-gradient(180deg, rgba(242,182,61,.09), rgba(242,182,61,.015));
    box-shadow:0 0 0 1px rgba(242,182,61,.3), 0 12px 36px rgba(0,0,0,.3)}
  .chain-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
    padding:14px 18px;background:linear-gradient(100deg, rgba(242,182,61,.22), rgba(242,182,61,.06));
    border-bottom:1px solid rgba(242,182,61,.35)}
  .chain-title{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;color:var(--gold);
    display:flex;align-items:center;gap:10px;text-shadow:0 1px 8px rgba(242,182,61,.25)}
  .chain-count{font-family:'Inter';font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
    color:#3a2600;background:var(--gold);padding:3px 11px;border-radius:20px;box-shadow:0 2px 8px rgba(242,182,61,.4)}
  .chain-tot{font-size:13px;color:var(--ink);font-weight:700;opacity:.92;
    background:rgba(0,0,0,.18);padding:5px 12px;border-radius:20px}
  .chain-grid{padding:16px}
  body{background:radial-gradient(1000px 400px at 85% -5%, #3a1f3533 0%, transparent 60%), var(--bg)}
  .logo{flex:none;filter:drop-shadow(0 3px 10px rgba(0,0,0,.45))}
  .stat{position:relative;overflow:hidden}
  .stat .v{font-family:'Bricolage Grotesque';font-weight:800}
  .stat.money .v{color:var(--gold)}
  .stat .k{letter-spacing:.06em;text-transform:uppercase;font-size:10.5px}
  .tcard{padding:18px;border-width:2px;transition:transform .15s ease, box-shadow .15s ease}
  .tcard:hover{transform:translateY(-3px)}
  .tcard.pay-paid{border-color:var(--ok);
    box-shadow:0 0 0 1px #3fae7240, 0 0 22px #3fae7233, var(--shadow);
    background:linear-gradient(180deg, #3fae7212, transparent 60%)}
  .tcard.pay-paid:hover{box-shadow:0 0 0 1px #3fae7255, 0 0 30px #3fae7255, var(--shadow)}
  .tcard.pay-unpaid{border-color:var(--bad);box-shadow:0 0 0 1px #e05a4840, var(--shadow)}
  .tcard.pay-none{border-color:var(--line)}
  /* Píldoras de estado de pago */
  .pay-pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;
    padding:4px 11px;border-radius:20px;letter-spacing:.2px}
  .pay-pill .pay-dot{width:8px;height:8px;border-radius:50%;flex:none}
  .pay-pill.paid{color:#1c6b45;background:#3fae7222;border:1px solid #3fae7255}
  .pay-pill.paid .pay-dot{background:#2f9e63;box-shadow:0 0 0 0 #2f9e6399;animation:pay-pulse 1.8s infinite}
  .pay-pill.unpaid{color:var(--bad);background:#e05a4818;border:1px solid #e05a4844}
  .pay-pill.unpaid .pay-dot{background:var(--bad)}
  .pay-pill.none{color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--line)}
  .pay-pill.none .pay-dot{background:var(--muted);opacity:.6}
  @keyframes pay-pulse{
    0%{box-shadow:0 0 0 0 #2f9e6399} 70%{box-shadow:0 0 0 7px #2f9e6300} 100%{box-shadow:0 0 0 0 #2f9e6300}}
  .bignum{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;line-height:1}
  .bignum small{font-size:11px;font-weight:600;color:var(--muted);display:block;letter-spacing:.05em;text-transform:uppercase}
  .owner-badge{background:var(--gold);color:#2c1e05;font-size:10.5px;font-weight:800;
    letter-spacing:.09em;padding:3px 9px;border-radius:6px;text-transform:uppercase}
  img[src^="data:image"]{background:#fff;padding:8px;border-radius:10px}
  .tcard .name{font-family:'Bricolage Grotesque';font-weight:800;font-size:18px}
  /* Etiqueta de plan en la tarjeta */
  .plan-badge{font-family:'Inter';font-size:10.5px;font-weight:800;color:#fff;padding:3px 11px;
    border-radius:20px;letter-spacing:.5px;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.3);
    text-transform:uppercase;flex:none;display:inline-flex;align-items:center;gap:4px;
    border:1px solid rgba(255,255,255,.25)}
  /* Selector de plan al crear */
  .plan-pick{border:2px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;
    cursor:pointer;transition:.15s;background:rgba(255,255,255,.02)}
  .plan-pick:hover{border-color:var(--plum)}
  .plan-pick.sel{border-color:var(--gold);background:rgba(242,182,61,.12);box-shadow:0 0 0 1px var(--gold)}
  .plan-pick .pp-emoji{font-size:22px}
  .plan-pick .pp-name{font-weight:800;font-size:14px;margin-top:3px;color:var(--ink)}
  .plan-pick .pp-price{font-size:13px;color:var(--gold);font-weight:700;margin-top:2px}
  .plan-pick .pp-price span{font-size:11px;color:var(--muted);font-weight:500}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
  .stat{padding:14px 16px}
  .stat .k{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:26px;margin-top:2px}
  .overlay{position:fixed;inset:0;background:rgba(35,28,33,.42);display:grid;place-items:center;padding:20px;z-index:50}
  .modal{width:100%;max-width:520px;max-height:88vh;overflow:auto;padding:24px}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .close{font-size:22px;color:var(--muted);line-height:1;padding:2px 8px;cursor:pointer}
  #toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:99}
  .toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;box-shadow:var(--shadow)}
  .toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  code.codebox{background:#3a2a3d;padding:2px 7px;border-radius:6px;font-weight:600;color:var(--plum);font-size:12.5px;word-break:break-all}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .section-card{padding:22px;margin-bottom:18px}
  @media(max-width:640px){.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="brand"><svg class="logo" viewBox="0 0 48 48" width="42" height="42" aria-hidden="true">
  <rect x="2" y="2" width="44" height="44" rx="11" fill="#8d4470"/>
  <path d="M16.5 35 V13 h15.5 v5 h-9.4 v4.6 h8 v5 h-8 V35 Z" fill="#ffffff"/>
  <rect x="33.5" y="13" width="5" height="5" rx="1.6" fill="#f2b63d"/>
</svg><div class="brand-name">Fidelia</div></div>
    <p class="sub" style="margin-bottom:22px">Plataforma · Panel del propietario</p>
    <div class="field"><label>Usuario</label><input id="lg-user" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input id="lg-pass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
    <p id="lg-err" class="sub" style="color:var(--bad);margin-top:12px"></p>
  </div>
</div>

<div id="app" class="hide">
  <div class="wrap">
    <div class="page-head">
      <div class="brand"><svg class="logo" viewBox="0 0 48 48" width="42" height="42" aria-hidden="true">
  <rect x="2" y="2" width="44" height="44" rx="11" fill="#8d4470"/>
  <path d="M16.5 35 V13 h15.5 v5 h-9.4 v4.6 h8 v5 h-8 V35 Z" fill="#ffffff"/>
  <rect x="33.5" y="13" width="5" height="5" rx="1.6" fill="#f2b63d"/>
</svg>
        <div><div class="brand-name">Fidelia <span class="owner-badge" style="vertical-align:3px;margin-left:6px">Panel del propietario</span></div>
        <div class="sub">Gestiona los negocios de tus clientes</div></div></div>
      <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
        <div style="display:flex;gap:7px" class="util-group">
          <button class="btn btn-ghost btn-sm" onclick="billingSettings()" title="Facturación y Stripe">💳 Facturación</button>
          <button class="btn btn-ghost btn-sm" onclick="showInfo()" title="Copias de seguridad">💾 Datos</button>
          <button class="btn btn-ghost btn-sm" onclick="pwForm()" title="Cambiar contraseña">🔑</button>
          <button class="btn btn-ghost btn-sm" onclick="doLogout()" title="Cerrar sesión">⏻</button>
        </div>
        <button class="btn btn-primary" style="padding:11px 20px;font-size:14.5px" onclick="createForm()">＋ Nuevo negocio</button>
      </div>
    </div>
    <div class="stat-grid" id="pstats"></div>
    <div id="revchart"></div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 12px">
      <h2 style="font-family:'Bricolage Grotesque';font-size:19px;margin:0">Tus negocios <span id="tcount" class="sub"></span></h2>
      <span class="sub" id="refresh-note">Se actualiza solo cada minuto</span>
    </div>
    <div id="tenants" style="display:flex;flex-direction:column;gap:20px"><div class="empty">Cargando…</div></div>
  </div>
</div>

<div id="modal-root"></div>
<div id="toasts"></div>
<script src="/static/platform.js?v=8ee2f9cd"></script>
</body>
</html>
